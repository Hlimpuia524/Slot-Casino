<!DOCTYPE html>
<html lang="en">
<head>
<title>Lucky 7s Slot</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{background:url('https://i.imgur.com/8YvK2pL.jpg') no-repeat center fixed;background-size:cover;color:white;text-align:center;font-family:Arial;margin:0}
.topbar{display:flex;justify-content:space-between;padding:10px;background:rgba(184,134,11,0.8)}
.back{color:gold;text-decoration:none;font-size:18px;font-weight:bold}
.balance{color:lime;font-size:22px;font-weight:bold}
.slot-box{background:rgba(255,215,0,0.9);padding:20px;border-radius:20px;border:5px solid gold;margin:20px auto;max-width:400px;backdrop-filter:blur(5px)}
.reels{display:flex;justify-content:center;gap:10px}
.reel{width:100px;height:100px;background:#fff;border:4px solid gold;border-radius:10px;overflow:hidden;box-shadow:0 0 10px gold}
.reel img{width:100%;height:100%;object-fit:cover}
#spinBtn{font-size:28px;padding:15px 50px;background:gold;color:black;border:none;border-radius:15px;font-weight:bold;margin-top:20px;cursor:pointer}
#msg{font-size:20px;color:black;height:30px;font-weight:bold}
</style>
</head>
<body>
<div class="topbar">
  <a href="index.html" class="back">← BACK TO MENU</a>
  <div class="balance">COINS: <span id="coins">1000</span> | FREE: <span id="freespins">0</span></div>
</div>
<h1 style="text-shadow:0 0 10px gold">LUCKY 7s - FREE SPINS</h1>
<div class="slot-box">
  <div class="reels">
    <div class="reel"><img id="r1" src="https://i.imgur.com/8KzQb1P.png"></div>
    <div class="reel"><img id="r2" src="https://i.imgur.com/8KzQb1P.png"></div>
    <div class="reel"><img id="r3" src="https://i.imgur.com/8KzQb1P.png"></div>
  </div>
</div>
<button id="spinBtn">SPIN -10 COINS</button>
<p id="msg">Get 3x7 for 10 FREE SPINS!</p>
<script>
let coins = parseInt(localStorage.getItem("walletCoins")) || 1000;
let freespins = 0;
document.getElementById("coins").innerText = coins;
let images = ["https://i.imgur.com/8KzQb1P.png","https://i.imgur.com/4QvZ9xL.png","https://i.imgur.com/1PbK8zM.png"];
function saveCoins() {localStorage.setItem("walletCoins", coins);}
document.getElementById("spinBtn").onclick = function() {
  if(freespins == 0 && coins < 10){ alert("Not enough coins!"); return; }
  if(freespins == 0) coins -= 10; else freespins--;

  let rand1 = Math.floor(Math.random()*3);let rand2 = Math.floor(Math.random()*3);let rand3 = Math.floor(Math.random()*3);
  document.getElementById("r1").src = images[rand1];document.getElementById("r2").src = images[rand2];document.getElementById("r3").src = images[rand3];

  if(rand1==0 && rand2==0 && rand3==0) {coins += 50; freespins += 10; document.getElementById("msg").innerText = "10 FREE SPINS +50!";}
  else if(rand1 == rand2 && rand2 == rand3) {coins += 30; document.getElementById("msg").innerText = "YOU WIN! +30!";}
  else {document.getElementById("msg").innerText = "Try Again!";}

  document.getElementById("coins").innerText = coins;
  document.getElementById("freespins").innerText = freespins;
  saveCoins();
}
</script>
</body>
</html>
