<!DOCTYPE html><html lang="en"><head><title>Mega Jackpot</title><meta name="viewport" content="width=device-width, initial-scale=1">
<style>body{background:url('https://i.imgur.com/Z9kL4mN.jpg') no-repeat center fixed;background-size:cover;color:white;text-align:center;font-family:'Arial Black',Arial;margin:0}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:8px 15px;background:rgba(0,0,0,0.85)}.back{color:gold;text-decoration:none;font-size:16px;font-weight:bold}.balance{color:gold;font-size:18px}
.title{background:linear-gradient(#000,gold);padding:8px;color:gold;font-size:24px;text-shadow:0 0 15px gold}
.main{display:flex;justify-content:center;gap:10px;margin:15px auto}.reels{display:grid;grid-template-columns:repeat(3,100px);gap:5px;background:rgba(0,0,0,0.8);padding:10px;border:4px solid gold;border-radius:15px;box-shadow:0 0 30px gold}
.reel{width:100px;height:100px;background:#111;border:2px solid gold;border-radius:10px;overflow:hidden}.reel img{width:100%;height:100%;object-fit:cover}
.multi{width:80px;background:rgba(0,0,0,0.8);padding:5px;border:3px solid gold;border-radius:10px}.multi div{background:gold;color:black;margin:5px;padding:6px;border-radius:8px;font-weight:bold;font-size:14px}

#win{font-size:22px;color:yellow;margin-top:8px;font-weight:bold}#bet{color:white;font-size:16px}</style></head><body>
<div class="topbar"><a href="index.html" class="back">← BACK</a><div class="balance">Balance: <span id="coins">1000</span></div></div>
<div class="title">MEGA JACKPOT 5000x</div><div class="main"><div class="reels">
<div class="reel"><img id="r1" src="https://i.imgur.com/9xL4zQv.png"></div><div class="reel"><img id="r2" src="https://i.imgur.com/9xL4zQv.png"></div><div class="reel"><img id="r3" src="https://i.imgur.com/9xL4zQv.png"></div>
<div class="reel"><img id="r4" src="https://i.imgur.com/9xL4zQv.png"></div><div class="reel"><img id="r5" src="https://i.imgur.com/9xL4zQv.png"></div><div class="reel"><img id="r6" src="https://i.imgur.com/9xL4zQv.png"></div>
<div class="reel"><img id="r7" src="https://i.imgur.com/9xL4zQv.png"></div><div class="reel"><img id="r8" src="https://i.imgur.com/9xL4zQv.png"></div><div class="reel"><img id="r9" src="https://i.imgur.com/9xL4zQv.png"></div>
</div><div class="multi"><div>1000x</div><div>5000x</div><div style="background:purple;color:white">MEGA</div><div>5000x</div><div>1000x</div></div></div>
<div class="spin-area"><div id="bet">Bet: 50 COINS</div><button id="spinBtn">SPIN</button><div id="win">WIN: 0</div></div>
<script>let coins=parseInt(localStorage.getItem("walletCoins"))||1000;let bet=50;document.getElementById("coins").innerText=coins;
let symbols=["https://i.imgur.com/9xL4zQv.png","https://i.imgur.com/8KzQb1P.png","https://i.imgur.com/1PbK8zM.png","https://i.imgur.com/5ZxL1mQ.png"];
function saveCoins(){localStorage.setItem("walletCoins",coins);}
document.getElementById("spinBtn").onclick=function(){if(coins<bet){alert("Not enough coins!");return;}coins-=bet;let win=0;let multi=1;for(let i=1;i<=9;i++){let r=Math.floor(Math.random()*4);document.getElementById("r"+i).src=symbols[r];}
if(Math.random()<0.01)multi=Math.random()<0.5?1000:5000;if(Math.random()<0.25)win=bet*(10+Math.floor(Math.random()*20));coins+=win*multi;document.getElementById("coins").innerText=coins;document.getElementById("win").innerText="WIN: "+win*multi;saveCoins();}</script></body></html>
