<!DOCTYPE html>
<html lang="en">
<head>
<title>Bar Fortune Slot</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{background:url('https://i.imgur.com/5TqR8wZ.jpg') no-repeat center fixed;background-size:cover;color:white;text-align:center;font-family:Arial;margin:0}
.topbar{display:flex;justify-content:space-between;padding:10px;background:rgba(0,0,0,0.8)}
.back{color:silver;text-decoration:none;font-size:18px;font-weight:bold}
.balance{color:lime;font-size:22px;font-weight:bold}
.slot-box{background:rgba(50,50,50,0.9);padding:20px;border-radius:20px;border:5px solid silver;margin:20px auto;max-width:400px;backdrop-filter:blur(5px)}
.reels{display:flex;justify-content:center;gap:10px}
.reel{width:100px;height:100px;background:#fff;border:4px solid silver;border-radius:10px;overflow:hidden}
.reel img{width:100%;height:100%;object-fit:cover}
#spinBtn{font-size:28px;padding:15px 50px;background:silver;color:black;border:none;border-radius:15px;font-weight:bold;margin-top:20px;cursor:pointer}
#msg{font-size:20px;color:silver;height:30px;font-weight:bold}
</style>
</head>
<body>
<div class="topbar">
  <a href="index.html" class="back">← BACK TO MENU</a>
  <div class="balance">COINS: <span id="coins">1000</span></div>
</div>
<h1 style="text-shadow:0 0 10px silver">BAR FORTUNE - MULTIPLIER</h1>
<div class="slot-box">
  <div class="reels">
    <div class="reel"><img id="r1" src="https://i.imgur.com/1PbK8zM.png"></div>
    <div class="reel"><img id="r2" src="https://i.imgur.com/1PbK8zM.png"></div>
    <div class="reel"><img id="r3" src="https://i.imgur.com/1PbK8zM.png"></div>
  </div>
</div>
<button id="spinBtn">SPIN -20 COINS</button>
<p id="msg">3x BAR = x3 WIN!</p>
<script>
let coins = parseInt(localStorage.getItem("walletCoins")) || 1000;
document.getElementById("coins").innerText = coins;
let images = ["https://i.imgur.com/1PbK8zM.png","https://i.imgur.com/8KzQb1P.png","https://i.imgur.com/4QvZ9xL.png"];
function saveCoins() {localStorage.setItem("walletCoins", coins);}
document.getElementById("spinBtn").onclick = function() {
  if(coins < 20){ alert("Not enough coins!"); return; }
  coins -= 20;
  let rand1 = Math.floor(Math.random()*3);let rand2 = Math.floor(Math.random()*3);let rand3 = Math.floor(Math.random()*3);
  document.getElementById("r1").src = images[rand1];document.getElementById("r2").src = images[rand2];document.getElementById("r3").src = images[rand3];

  let win = 0; let multi = 1;
  if(rand1 == rand2 && rand2 == rand3) win = 60;
  if(rand1==0 && rand2==0 && rand3==0) multi = 3; // 3x BAR
  else if(rand1==0 || rand2==0 || rand3==0) multi = 2; // 1x BAR

  coins += win * multi;
  document.getElementById("msg").innerText = win>0? "WIN! +" + (win*multi) + " COINS x" + multi : "Try Again!";
  document.getElementById("coins").innerText = coins;saveCoins();
}
</script>
</body>
</html>
