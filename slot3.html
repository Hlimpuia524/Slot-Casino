<!DOCTYPE html>
<html lang="en">
<head>
<title>Diamond Jackpot Slot</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{background:url('https://i.imgur.com/7WqR5tY.jpg') no-repeat center center fixed;background-size:cover;color:white;text-align:center;font-family:Arial;margin:0}
.topbar{display:flex;justify-content:space-between;padding:10px;background:rgba(0,26,51,0.8)}
.back{color:aqua;text-decoration:none;font-size:18px;font-weight:bold}
.balance{color:cyan;font-size:22px;font-weight:bold}
.slot-box{background:rgba(0,0,0,0.9);padding:20px;border-radius:20px;border:5px solid aqua;margin:20px auto;max-width:400px;box-shadow:0 0 20px aqua;backdrop-filter:blur(5px)}
.reels{display:flex;justify-content:center;gap:10px}
.reel{width:100px;height:100px;background:#111;border:4px solid aqua;border-radius:10px;overflow:hidden;box-shadow:0 0 10px aqua}
.reel img{width:100%;height:100%;object-fit:cover}
#spinBtn{font-size:28px;padding:15px 50px;background:aqua;color:black;border:none;border-radius:15px;font-weight:bold;margin-top:20px;cursor:pointer;box-shadow:0 0 15px aqua}
#msg{font-size:20px;color:aqua;height:30px;text-shadow:0 0 10px black}
</style>
</head>
<body>
<div class="topbar">
  <a href="index.html" class="back">← BACK TO MENU</a>
  <div class="balance">COINS: <span id="coins">1000</span></div>
</div>
<h1 style="text-shadow:0 0 10px aqua">DIAMOND JACKPOT</h1>
<div class="slot-box">
  <div class="reels">
    <div class="reel"><img id="r1" src="https://i.imgur.com/9xL4zQv.png"></div>
    <div class="reel"><img id="r2" src="https://i.imgur.com/9xL4zQv.png"></div>
    <div class="reel"><img id="r3" src="https://i.imgur.com/9xL4zQv.png"></div>
  </div>
</div>
<button id="spinBtn">SPIN -15 COINS</button>
<p id="msg">Get 3 Diamonds for 500 Coins!</p>
<script>
let coins = parseInt(localStorage.getItem("walletCoins")) || 1000;
document.getElementById("coins").innerText = coins;
let diamond = "https://i.imgur.com/9xL4zQv.png";
let other = ["https://i.imgur.com/8KzQb1P.png","https://i.imgur.com/4QvZ9xL.png","https://i.imgur.com/1PbK8zM.png"];
function saveCoins() {localStorage.setItem("walletCoins", coins);}
document.getElementById("spinBtn").onclick = function() {
  if(coins < 15){ alert("Not enough coins!"); return; }
  coins -= 15;
  let r1 = Math.random() < 0.3? diamond : other[Math.floor(Math.random()*3)];
  let r2 = Math.random() < 0.3? diamond : other[Math.floor(Math.random()*3)];
  let r3 = Math.random() < 0.3? diamond : other[Math.floor(Math.random()*3)];
  document.getElementById("r1").src = r1;document.getElementById("r2").src = r2;document.getElementById("r3").src = r3;
  if(r1 == diamond && r2 == diamond && r3 == diamond) {coins += 500; document.getElementById("msg").innerText = "MEGA JACKPOT! +500 COINS!";}
  else {document.getElementById("msg").innerText = "Keep Spinning!";}
  document.getElementById("coins").innerText = coins;saveCoins();
}
</script>
</body>
</html>
