<!DOCTYPE html>
<html lang="en">
<head>
<title>Fruit Mania Slot</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{background:url('https://i.imgur.com/3KpL8zN.jpg') no-repeat center fixed;background-size:cover;color:white;text-align:center;font-family:Arial;margin:0}
.topbar{display:flex;justify-content:space-between;padding:10px;background:rgba(0,100,0,0.8)}
.back{color:yellow;text-decoration:none;font-size:18px;font-weight:bold}
.balance{color:lime;font-size:22px;font-weight:bold}
.slot-box{background:rgba(34,139,34,0.9);padding:15px;border-radius:20px;border:5px solid yellow;margin:15px auto;max-width:450px;backdrop-filter:blur(5px)}
.reels{display:flex;justify-content:center;gap:5px;flex-wrap:wrap}
.reel{width:70px;height:70px;background:#fff;border:3px solid yellow;border-radius:10px;overflow:hidden;box-shadow:0 0 10px yellow}
.reel img{width:100%;height:100%;object-fit:cover}
#spinBtn{font-size:24px;padding:12px 40px;background:yellow;color:darkgreen;border:none;border-radius:15px;font-weight:bold;margin-top:15px;cursor:pointer}
#msg{font-size:18px;color:yellow;height:25px;text-shadow:0 0 10px black}
</style>
</head>
<body>
<div class="topbar">
  <a href="index.html" class="back">← BACK TO MENU</a>
  <div class="balance">COINS: <span id="coins">1000</span></div>
</div>
<h1 style="text-shadow:0 0 10px green">FRUIT MANIA - 5 REELS</h1>
<div class="slot-box">
  <div class="reels">
    <div class="reel"><img id="r1" src="https://i.imgur.com/4QvZ9xL.png"></div>
    <div class="reel"><img id="r2" src="https://i.imgur.com/4QvZ9xL.png"></div>
    <div class="reel"><img id="r3" src="https://i.imgur.com/4QvZ9xL.png"></div>
    <div class="reel"><img id="r4" src="https://i.imgur.com/4QvZ9xL.png"></div>
    <div class="reel"><img id="r5" src="https://i.imgur.com/4QvZ9xL.png"></div>
  </div>
</div>
<button id="spinBtn">SPIN -20 COINS</button>
<p id="msg">Match 3 Fruits to Win!</p>
<script>
let coins = parseInt(localStorage.getItem("walletCoins")) || 1000;
document.getElementById("coins").innerText = coins;
let images = ["https://i.imgur.com/4QvZ9xL.png","https://i.imgur.com/1PbK8zM.png","https://i.imgur.com/9xL4zQv.png","https://i.imgur.com/7QmR2tY.png"];
function saveCoins() {localStorage.setItem("walletCoins", coins);}
document.getElementById("spinBtn").onclick = function() {
  if(coins < 20){ alert("Not enough coins!"); return; }
  coins -= 20;let results = [];
  for(let i=1;i<=5;i++){let rand = Math.floor(Math.random()*4);document.getElementById("r"+i).src = images;results.push(rand);}
  let counts = {};results.forEach(x => counts[x] = (counts[x] || 0) + 1);
  let win = Object.values(counts).some(v => v >= 3);
  if(win) {coins += 80; document.getElementById("msg").innerText = "YOU WIN! +80 COINS!";}
  else {document.getElementById("msg").innerText = "No Match!";}
  document.getElementById("coins").innerText = coins;saveCoins();
}
</script>
</body>
</html>
