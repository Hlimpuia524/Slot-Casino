<!DOCTYPE html>
<html lang="en">
<head>
<title>Cherry Blast</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{background:url('https://i.imgur.com/6HgJ4kM.jpg') no-repeat center fixed;background-size:cover;color:white;text-align:center;font-family:'Arial Black',Arial;margin:0}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:8px 15px;background:rgba(0,0,0,0.85)}
.back{color:pink;text-decoration:none;font-size:16px;font-weight:bold}
.balance{color:lime;font-size:18px}
.title{background:linear-gradient(#DC143C,#000);padding:8px;color:pink;font-size:24px;text-shadow:0 0 10px pink}
.main{display:flex;justify-content:center;gap:10px;margin:15px auto}
.reels{display:grid;grid-template-columns:repeat(3,100px);gap:5px;background:rgba(0,0,0,0.8);padding:10px;border:4px solid pink;border-radius:15px;box-shadow:0 0 20px pink}
.reel{width:100px;height:100px;background:#111;border:2px solid pink;border-radius:10px;overflow:hidden}
.reel img{width:100%;height:100%;object-fit:cover}
.multi{width:80px;background:rgba(0,0,0,0.8);padding:5px;border:3px solid pink;border-radius:10px}
.multi div{background:hotpink;color:black;margin:5px;padding:6px;border-radius:8px;font-weight:bold;font-size:14px}
.spin-area{margin-top:10px}
#spinBtn{width:110px;height:110px;border-radius:50%;background:radial-gradient(pink,red);color:white;font-size:22px;font-weight:bold;border:8px solid #8B0000;cursor:pointer;box-shadow:0 0 20px pink}
#win{font-size:20px;color:yellow;margin-top:8px;font-weight:bold}
#bet{color:white;font-size:16px}
</style>
</head>
<body>
<div class="topbar">
  <a href="index.html" class="back">← BACK</a>
  <div class="balance">Balance: <span id="coins">1000</span></div>
</div>
<div class="title">CHERRY BLAST CASCADE</div>

<div class="main">
  <div class="reels">
    <div class="reel"><img id="r1" src="https://i.imgur.com/4QvZ9xL.png"></div><div class="reel"><img id="r2" src="https://i.imgur.com/4QvZ9xL.png"></div><div class="reel"><img id="r3" src="https://i.imgur.com/4QvZ9xL.png"></div>
    <div class="reel"><img id="r4" src="https://i.imgur.com/4QvZ9xL.png"></div><div class="reel"><img id="r5" src="https://i.imgur.com/4QvZ9xL.png"></div><div class="reel"><img id="r6" src="https://i.imgur.com/4QvZ9xL.png"></div>
    <div class="reel"><img id="r7" src="https://i.imgur.com/4QvZ9xL.png"></div><div class="reel"><img id="r8" src="https://i.imgur.com/4QvZ9xL.png"></div><div class="reel"><img id="r9" src="https://i.imgur.com/4QvZ9xL.png"></div>
  </div>
  <div class="multi">
    <div>x2</div><div>x3</div><div style="background:purple;color:white">CASCADE</div><div>x5</div><div>x10</div>
  </div>
</div>

<div class="spin-area">
  <div id="bet">Bet: 15 COINS</div>
  <button id="spinBtn">SPIN</button>
  <div id="win">WIN: 0</div>
</div>

<script>
let coins = parseInt(localStorage.getItem("walletCoins")) || 1000;
let bet = 15;
document.getElementById("coins").innerText = coins;

// 0=Cherry 1=Lemon 2=Orange 3=Scatter
let symbols = [
  "https://i.imgur.com/4QvZ9xL.png",
  "https://i.imgur.com/8KzQb1P.png",
  "https://i.imgur.com/1PbK8zM.png",
  "https://i.imgur.com/5ZxL1mQ.png"
];

function saveCoins() {localStorage.setItem("walletCoins", coins);}

function doSpin(multi) {
  let results = [];
  for(let i=1; i<=9; i++){
    let rand = Math.floor(Math.random()*4);
    document.getElementById("r"+i).src = symbols;
    results.push(rand);
  }

  let win = 0;
  // Check 3 same in row = CASCADE
  for(let row=0; row<3; row++){
    if(results[row*3] == results[row*3+1] && results[row*3+1] == results[row*3+2] && results[row*3]!=3) {
      win += 30 * bet * multi;
    }
  }
  return win;
}

document.getElementById("spinBtn").onclick = function() {
  if(coins < bet){ alert("Not enough coins!"); return; }
  coins -= bet;
  let totalWin = 0;
  let cascade = 1;
  let msg = "Try Again!";

  // CASCADE 3x thleng
  for(let c=0; c<3; c++){
    let win = doSpin(cascade);
    if(win > 0){
      totalWin += win;
      cascade++;
      msg = "CASCADE x" + cascade + " WIN!";
    } else break;
  }

  coins += totalWin;
  document.getElementById("coins").innerText = coins;
  document.getElementById("win").innerText = "WIN: " + totalWin;
  saveCoins();
}
</script>
</body>
</html>
