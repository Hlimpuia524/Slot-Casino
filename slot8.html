<!DOCTYPE html>
<html lang="en">
<head>
<title>Fortune Garuda 500</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{background:url('https://i.imgur.com/kL9wR2M.jpg') no-repeat center center fixed;background-size:cover;color:white;text-align:center;font-family:Arial;margin:0}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:8px;background:rgba(0,0,0,0.8)}
.back{color:gold;text-decoration:none;font-size:16px;font-weight:bold}
.balance{color:gold;font-size:18px}
.title{background:linear-gradient(#8B0000,#000);padding:5px;color:gold;font-size:22px;font-weight:bold;text-shadow:0 0 10px gold}
.main{display:flex;justify-content:center;gap:10px;margin-top:10px}
.reels{display:grid;grid-template-columns:repeat(3,110px);gap:5px;background:rgba(0,0,0,0.7);padding:10px;border:4px solid gold;border-radius:15px}
.reel{width:110px;height:110px;background:#111;border:2px solid gold;border-radius:10px;overflow:hidden}
.reel img{width:100%;height:100%;object-fit:cover}
.multi{width:90px;background:rgba(0,0,0,0.7);padding:5px;border:3px solid gold;border-radius:10px}
.multi div{background:orange;color:black;margin:5px;padding:5px;border-radius:8px;font-weight:bold}
.spin-area{margin-top:15px}
#spinBtn{width:120px;height:120px;border-radius:50%;background:radial-gradient(gold,orange);color:black;font-size:24px;font-weight:bold;border:8px solid #8B0000;cursor:pointer;box-shadow:0 0 20px gold}
#win{font-size:20px;color:yellow;margin-top:10px}
#bet{color:white}
</style>
</head>
<body>
<div class="topbar">
  <a href="index.html" class="back">← YY6.com</a>
  <div class="balance">Balance: ₹<span id="coins">0.19</span></div>
</div>
<div class="title">FORTUNE GARUDA 500</div>

<div class="main">
  <div class="reels">
    <div class="reel"><img id="r1" src="https://i.imgur.com/2JkF4cN.png"></div>
    <div class="reel"><img id="r2" src="https://i.imgur.com/9xL4zQv.png"></div>
    <div class="reel"><img id="r3" src="https://i.imgur.com/9xL4zQv.png"></div>
    <div class="reel"><img id="r4" src="https://i.imgur.com/2JkF4cN.png"></div>
    <div class="reel"><img id="r5" src="https://i.imgur.com/9xL4zQv.png"></div>
    <div class="reel"><img id="r6" src="https://i.imgur.com/9xL4zQv.png"></div>
    <div class="reel"><img id="r7" src="https://i.imgur.com/2JkF4cN.png"></div>
    <div class="reel"><img id="r8" src="https://i.imgur.com/9xL4zQv.png"></div>
    <div class="reel"><img id="r9" src="https://i.imgur.com/9xL4zQv.png"></div>
  </div>
  <div class="multi">
    <div>100x</div>
    <div>500x</div>
    <div style="background:purple;color:white">EX NUDGE</div>
    <div>500x</div>
    <div>100x</div>
  </div>
</div>

<div class="spin-area">
  <div id="bet">Bet ₹ 1</div>
  <button id="spinBtn">SPIN</button>
  <div id="win">WIN ₹ 0.00</div>
</div>

<script>
let coins = parseFloat(localStorage.getItem("walletCoins")) || 0.19;
let bet = 1;
document.getElementById("coins").innerText = coins.toFixed(2);

let symbols = [
  "https://i.imgur.com/2JkF4cN.png", // WILD/EX NUDGE - Garuda
  "https://i.imgur.com/9xL4zQv.png", // Blue Gem
  "https://i.imgur.com/1PbK8zM.png", // Red Gem
  "https://i.imgur.com/5ZxL1mQ.png" // SCATTER
];

function saveCoins() {localStorage.setItem("walletCoins", coins);}

document.getElementById("spinBtn").onclick = function() {
  if(coins < bet){ alert("Not enough balance!"); return; }
  coins -= bet;
  let win = 0;
  let multi = 1;
  let results = [];

  // Spin 9 reels
  for(let i=1; i<=9; i++){
    let rand = Math.floor(Math.random()*4);
    document.getElementById("r"+i).src = symbols;
    results.push(rand);
  }

  // EX NUDGE Check - Reel 1 full wild
  if(results[0]==0 && results[3]==0 && results[6]==0) {
    multi = 5;
    document.getElementById("win").innerText = "EX NUDGE x5!";
  }

  // Simple win check - 3 same in a row
  for(let row=0; row<3; row++){
    if(results[row*3] == results[row*3+1] && results[row*3+1] == results[row*3+2] && results[row*3]!=0) {
      win += 10 * bet;
    }
  }

  // Random 100x or 500x bonus
  if(Math.random() < 0.05) {
    multi = Math.random() < 0.5? 100 : 500;
  }

  coins += win * multi;
  document.getElementById("coins").innerText = coins.toFixed(2);
  document.getElementById("win").innerText = "WIN ₹ " + (win*multi).toFixed(2);
  saveCoins();
}
</script>
</body>
</html>
