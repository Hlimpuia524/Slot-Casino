<!DOCTYPE html>
<html lang="en">
<head>
<title>Vegas Nights Slot</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{background:url('https://i.imgur.com/QzL9mXp.jpg') no-repeat center center fixed;background-size:cover;color:white;text-align:center;font-family:Arial;margin:0}
.topbar{display:flex;justify-content:space-between;padding:10px;background:rgba(75,0,130,0.8)}
.back{color:magenta;text-decoration:none;font-size:18px;font-weight:bold}
.balance{color:gold;font-size:22px;font-weight:bold}
.slot-box{background:rgba(138,43,226,0.9);padding:20px;border-radius:20px;border:5px solid magenta;margin:20px auto;max-width:400px;backdrop-filter:blur(5px)}
.reels{display:flex;justify-content:center;gap:10px}
.reel{width:100px;height:100px;background:#fff;border:4px solid magenta;border-radius:10px;overflow:hidden;box-shadow:0 0 10px magenta}
.reel img{width:100%;height:100%;object-fit:cover}
#spinBtn{font-size:28px;padding:15px 50px;background:magenta;color:white;border:none;border-radius:15px;font-weight:bold;margin-top:20px;cursor:pointer;box-shadow:0 0 15px magenta}
#msg{font-size:20px;color:white;height:30px;text-shadow:0 0 10px black}
</style>
</head>
<body>
<div class="topbar">
  <a href="index.html" class="back">← BACK TO MENU</a>
  <div class="balance">COINS: <span id="coins">1000</span></div>
</div>
<h1 style="text-shadow:0 0 10px magenta">VEGAS NIGHTS - WILD FEATURE</h1>
<div class="slot-box">
  <div class="reels">
    <div class="reel"><img id="r1" src="https://i.imgur.com/1PbK8zM.png"></div>
    <div class="reel"><img id="r2" src="https://i.imgur.com/1PbK8zM.png"></div>
    <div class="reel"><img id="r3" src="https://i.imgur.com/1PbK8zM.png"></div>
  </div>
</div>
<button id="spinBtn">SPIN -25 COINS</button>
<p id="msg">WILD = x2 Win!</p>
<script>
let coins = parseInt(localStorage.getItem("walletCoins")) || 1000;
document.getElementById("coins").innerText = coins;
let images = ["https://i.imgur.com/1PbK8zM.png","https://i.imgur.com/8KzQb1P.png","https://i.imgur.com/4QvZ9xL.png","https://i.imgur.com/0QpS8rE.png"]; // 0QpS8rE = WILD
function saveCoins() {localStorage.setItem("walletCoins", coins);}
document.getElementById("spinBtn").onclick = function() {
  if(coins < 25){ alert("Not enough coins!"); return; }
  coins -= 25;
  let rand1 = Math.floor(Math.random()*4);let rand2 = Math.floor(Math.random()*4);let rand3 = Math.floor(Math.random()*4);
  document.getElementById("r1").src = images[rand1];document.getElementById("r2").src = images[rand2];document.getElementById("r3").src = images[rand3];
  let win = 0;
  if(rand1 == rand2 && rand2 == rand3) win = 150;
  if(rand1==3 || rand2==3 || rand3==3) win = win*2; // WILD x2
  if(win > 0) {coins += win; document.getElementById("msg").innerText = "YOU WIN! +" + win + " COINS!";}
  else {document.getElementById("msg").innerText = "Try Again!";}
  document.getElementById("coins").innerText = coins;saveCoins();
}
</script>
</body>
</html>
